<!DOCTYPE html>
<html>
<header>
    <h1>Transfer Resource</h1>
    <title>Transfer resource</title>
    <style>
        header {
    background-color: #333;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  
  form {
    max-width: 600px;
    margin: 0px auto;
    padding: 20px;
    background-color: #f7f7f7;
    border: 1px solid #ddd;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }
  
  label {
    display: block;
    margin-bottom: 10px;
    font-weight: bold;
  }
  
  input[type="text"] {
    width: 95%;
    height: 40px;
    margin-bottom: 20px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  
  input[type="checkbox"] {
    margin-bottom: 20px;
    width: 20px;
  height: 20px;
    
  }
  
  input[type="submit"] {
    width: 49%;
    height: 40px;
    margin-bottom: 20px;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  
  input[type="submit"]:first-child {
    background-color: #6dc7fc;
    color: #fff;
  }
  
  input[type="submit"]:last-child {
    background-color: #337ab7;
    color: #fff;
  }
  
  input[type="submit"]:hover {
    opacity: 0.8;
  }
    </style>
  </header>
  <body>
  <form>
    <label for="resource-name">Resource Name:</label>
    <input type="text" id="resource-name" name="resource-name"><br><br>
    <label for="resource-id">Resource ID:</label>
    <input type="text" id="resource-id" name="resource-id"><br><br>
    <label for="sender-name">Sender Name:</label>
    <input type="text" id="sender-name" name="sender-name"><br><br>
    <label for="receiver-name">Receiver Name:</label>
    <input type="text" id="receiver-name" name="receiver-name"><br><br>
    <input type="checkbox" id="transfer-checkbox" name="transfer-checkbox">
    <label for="transfer-checkbox">I am transferring the above material to Receiver Name</label><br><br>
    <input type="submit" value="Send">
    <input type="submit" value="Request">
  </form>
  </body>
  </html>
