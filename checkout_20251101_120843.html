<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f9f9f9;
    }
    input[type="text"] {
        width: 70%;
        padding: 8px;
        margin: 5px 0;
        display: inline-block;
        border: 1px solid #ccc;
        box-sizing: border-box;
        border-radius: 4px;
    }
    input[type="submit"] {
        background-color: #4CAF50;
        color: white;
        padding: 10px 15px;
        margin: 8px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 30%;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
    }
    h2{
        text-align: center;
        color: rgb(55, 0, 255);
    }
    th {
        background-color: #f2f2f2;
    }
</style>
</head>
<body>
<div class="container">
    <h2> Checkout</h2>
    <form id="searchForm">
        <label for="search">Search:</label>
        <input type="text" id="search" name="search" required>
        <input type="submit" value="Search">
    </form>

    <table id="results" >
        <tr>
            <th>Name</th>
            <th>S/N</th>
            <th>State</th>
        </tr>
    </table>
</div>
<script>
document.getElementById('searchForm').addEventListener('submit', function(event) {
    event.preventDefault();
    var searchTerm = document.getElementById('search').value;
    // Simulating data retrieval from the database
    var data = [
        { name: 'John Doe', serialNumber: '12345', state: 'California' },
        { name: 'Jane Smith', serialNumber: '67890', state: 'New York' },
        { name: 'Michael Johnson', serialNumber: '54321', state: 'Texas' }
    ];

    var resultsTable = document.getElementById('results');
    var tableBody = resultsTable.getElementsByTagName('tbody')[0] || resultsTable.createTBody();
    tableBody.innerHTML = '';

    data.forEach(function(item) {
        var row = tableBody.insertRow();
        var cell1 = row.insertCell(0);
        var cell2 = row.insertCell(1);
        var cell3 = row.insertCell(2);

        cell1.textContent = item.name;
        cell2.textContent = item.serialNumber;
        cell3.textContent = item.state;
    });

    resultsTable.style.display = 'block';
});
</script>
</body>
</html>
