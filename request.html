<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Request Form</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 20px;
}
h1{
    text-align: center;
}
form {
    width: 50%;
    margin: 40px auto;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

label {
    display: block;
    margin-bottom: 10px;
}

input[type="text"], select, textarea {
    width: 95%;
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
}

input[type="submit"] {
    background-color: #1ab6dd;
    color: #fff;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

input[type="submit"]:hover {
    background-color: #7abfdd;
}
    </style>
</head>
<body>
    <form>
        <h1>Request form</h1>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username"><br><br>
        
        <label for="department">Department:</label>
        <input type="text" id="department" name="department"><br><br>
        
        <label for="resource_type">Resource Type:</label>
        <select id="resource_type" name="resource_type">
            <option value="">Select an option</option>
            <option value="PC">PC</option>
            <option value="DESKTOP">DESKTOP</option>
            <option value="PRINTER">PRINTER</option>
            <option value="PROJECTOR">PROJECTOR</option>
            <option value="OTHERS">OTHERS</option>
        </select><br><br>
        
        <label for="request_type">Request Type:</label>
        <select id="request_type" name="request_type">
            <option value="">Select an option</option>
            <option value="BORROW">Borrow</option>
            <option value="LONG_TERM">Long Term</option>
        </select><br><br>
        
        <label for="request_description"> Description of a requsted device:</label>
        <textarea id="request_description" name="request_description" placeholder=" it's Optional...."></textarea><br><br>
        
        <input type="submit" value="Request">
    </form>
</body>
</html>
