<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Layout</title>
    <link rel="stylesheet" href="sign update .css" />
    <style>
      body {
        font-family: "Arial", sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #2c3e50;
        color: #ecf0f1;
        padding: 15px 30px;
        height: 50px;
        position: sticky;
        top: 0px;
        flex-wrap: nowrap;
        z-index: 1;
      }

      .navbar .logo img {
        height: 40px;
      }

      .navbar .logo span {
        font-size: 1.6em;
        margin-left: 8px;
        font-weight: bold;
        margin-top: 0px;
      }

      .navbar .nav-links {
        list-style: none;
        display: flex;
        align-items: center;
      }

      .navbar .nav-links li {
        margin: 0 20px;
        position: relative;
      }

      .navbar .nav-links a {
        color: #ecf0f1;
        text-decoration: none;
        font-size: 1em;
        transition: color 0.3s;
      }

      .navbar .nav-links a:hover {
        color: #3498db;
      }

      .navbar .login-button {
        background-color: #3498db;
        color: #fff;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        font-size: 1em;
        transition: background-color 0.3s;
      }

      .navbar .login-button:hover {
        background-color: #2980b9;
      }

      .navbar .dropdown-content {
        display: none;
        position: absolute;
        background-color: #34495e;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
        z-index: 1;
        top: 40px;
        left: 0;
      }

      .navbar .dropdown:hover .dropdown-content {
        display: block;
      }

      .navbar .dropdown-content li {
        padding: 12px 16px;
      }

      .navbar .dropdown-content li a {
        color: white;
        text-decoration: none;
        display: block;
        transition: background-color 0.3s;
      }

      .navbar .dropdown-content li:hover {
        background-color: #1abc9c;
      }

      .stats-section {
        display: flex;
        justify-content: space-around;
        background-color: #3498db;
        color: #fff;
        padding: 20px 0;
      }

      .stats-section .stat {
        text-align: center;
      }

      .stats-section .stat-number {
        font-size: 2.5em;
        font-weight: bold;
      }

      .stats-section .stat-label {
        font-size: 1.2em;
      }

      .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        margin: 20px 0;
      }

      .panel,
      .card {
        background-color: #fff;
        padding: 20px;
        margin: 15px;
        flex-basis: 22%;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        text-align: center;
        transition: transform 0.3s, box-shadow 0.3s;
      }

      .panel:hover,
      .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }

      .panel-icon,
      .card img {
        height: 100px;
        margin-bottom: 10px;
      }

      .panel-title,
      .card h2 {
        font-size: 1.4em;
        margin: 10px 0;
      }

      .panel-description,
      .card p {
        font-size: 1em;
        color: #555;
      }

      .header {
        text-align: center;
        padding: 40px;
        background-color: #2c3e50;
        color: #fff;
      }

      .header h1 {
        font-size: 2.5em;
        margin: 10px 0;
      }

      .header p {
        font-size: 1.2em;
      }

      .section {
        padding: 20px;
        background-color: #ecf0f1;
        margin: 20px 0;
        border-radius: 10px;
      }

      .section h2 {
        font-size: 1.8em;
        margin-bottom: 15px;
      }

      .section p {
        font-size: 1em;
        color: #555;
      }

      .column {
        display: flex;
        align-items: center;
        margin: 10px 0;
      }

      .column .icon {
        font-size: 2em;
        margin-right: 10px;
      }

      .footer {
        background-color: #2c3e50;
        color: #ecf0f1;
        padding: 30px 0;
        text-align: center;
      }

      .footer-links {
        display: flex;
        justify-content: center;
        list-style: none;
        padding: 0;
        margin-bottom: 20px;
      }

      .footer-links a {
        color: #ecf0f1;
        text-decoration: none;
        margin: 0 20px;
        font-size: 1em;
        transition: color 0.3s;
      }

      .footer-links a:hover {
        color: #3498db;
      }

      .social-media a img {
        width: 30px;
        margin: 0 10px;
      }

      .footer-copy {
        margin-top: 10px;
        font-size: 0.9em;
      }

      .background-container {
        background: url("images/photo-1581091226825-a6a2a5aee158.jspeg")
          no-repeat center center;
        background-size: cover;
        height: 800px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        color: white;
        background-color: #0b1418;
      }

      .background-container strong {
        font-size: 2.5em;
        margin-bottom: 20px;
        position: absolute;
        left: 10px;
        top: 400px;
      }
      .background-container p {
        position: absolute;
        /* top: 10px; */
        left: 10px;
      }

      .background-container button {
        padding: 15px 30px;
        font-size: 1.2em;
        cursor: pointer;
        background-color: #3498db;
        color: #fff;
        border: none;
        border-radius: 5px;
        transition: background-color 0.3s;
      }

      .background-container button:hover {
        background-color: #2980b9;
      }

      .nav-links li:hover {
        color: #3498db;
      }

      .welcome {
        text-align: center;
        margin-top: 0px;
        position: absolute;
        top: 60px;
      }

      .welcome h2 {
        font-size: 36px;
        color: #f7efef;
        text-shadow: 8px 8px 8px rgba(131, 128, 128, 0.63);
      }
    </style>
  </head>
