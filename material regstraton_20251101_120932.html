<!DOCTYPE html>
<html>
    <head>
        <title>material registration</title>
        <style>
            body {
  font-family: Arial, sans-serif;
  background-color: #f7f6f6;
}
h1{
  text-align: center;
}
form {
  color: #080808;
  width: 35%;
  margin: 40px auto;
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

label {
  display: block;
  margin-bottom: 10px;
}

select, input[type="text"] {
  width: 95%;
  height: 15px;
  margin-bottom: 20px;
  padding: 10px;
  border: 1px solid #ccc;
}

input[type="submit"] {
  width: 100%;
  height: 40px;
  background-color: #6dc7fc;
  color: #fff;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

input[type="submit"]:hover {
  background-color: #90d3ff;
}
        </style>
    </head>
    <body>
   
<form action="#">
  <h1>Material registration</h1>
    <label for="resource-type">Resource Type:</label>
    <select name="resource-type" id="resource-type">
      <option value="select">Select a resource type</option>
      <option value="PC">PC</option>
      <option value="DESKTOP">DESKTOP</option>
      <option value="PRINTER">PRINTER</option>
      <option value="PROJECTOR">PROJECTOR</option>
      <option value="OTHERS">OTHERS</option>
    </select>
    <br><br>
    <label for="resource-name">Resource Name:</label>
    <input type="text" id="resource-name" name="resource-name">
    <br><br>
    <label for="resource-id">Resource ID or Serial Number:</label>
    <input type="text" id="resource-id" name="resource-id">
    <br><br>
    <input type="submit" value="Register">
  </form>
</body>
</html>
